services:
  oci-logger:
    build: .
    container_name: oci-logger-svc
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health" ]
      interval: 60s
      timeout: 5s
      start_period: 10s
      retries: 3
